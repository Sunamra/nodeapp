<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>👋🏻</title>
	<link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/13/13706.png" type="image/x-icon">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
		integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
		crossorigin="anonymous" referrerpolicy="no-referrer" />

	<style>
		:root {
			--bg: linear-gradient(180deg, #0b1220 0%, #071018 100%);
			--card: rgba(10, 14, 20, 0.55);
			--muted: #9fb0c8;
			--accent-1: #a78bfa;
			--accent-2: #67e8f9;
			--text: #e6eef8;
			--shadow: 0 10px 30px rgba(2, 6, 23, 0.6);
		}

		* {
			box-sizing: border-box
		}

		html,
		body {
			height: 100%
		}

		body {
			margin: 0;
			font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
			background: var(--bg);
			color: var(--text);
			-webkit-font-smoothing: antialiased;
			-moz-osx-font-smoothing: grayscale;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 3rem;
		}

		.wrap {
			width: 100%;
			max-width: 980px;
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 28px;
			align-items: start
		}

		.card {
			position: relative;
			overflow: hidden;
			border-radius: 14px;
			padding: 18px;
			cursor: pointer;
			background: linear-gradient(135deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
			border: 1px solid rgba(255, 255, 255, 0.04);
			box-shadow: var(--shadow);
			display: flex;
			flex-direction: column;
			gap: 12px;
			min-height: 190px;
			user-select: none;
			transition: transform .22s ease, box-shadow .22s ease;
		}

		.card:hover {
			transform: translateY(-8px)
		}

		.card:focus {
			outline: 3px solid rgba(125, 92, 255, 0.8);
			outline-offset: 4px
		}

		.card-head {
			display: flex;
			align-items: center;
			gap: 12px
		}

		.card-img {
			width: 76px;
			height: 76px;
			border-radius: 10px;
			flex: 0 0 76px;
			display: block
		}

		.card-eyebrow {
			font-size: 12px;
			text-transform: uppercase;
			color: var(--muted);
			letter-spacing: 0.08em
		}

		.card-title {
			margin: 0;
			font-size: 18px
		}

		.card-desc {
			margin: 6px 0 0;
			color: var(--muted);
			font-size: 13px
		}

		/* white arrow top-right */
		.card-arrow {
			position: absolute;
			top: 12px;
			right: 12px;
			width: 50px;
			height: 50px;
			font-size: 1.2rem;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.card-arrow svg {
			width: 14px;
			height: 14px;
			fill: white;
			opacity: 0.95
		}

		@media (max-width:880px) {
			.wrap {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>

<body>
	<main class="wrap">
		<div class="card" role="button" tabindex="0" data-path="/apps/paste" aria-label="Share Text">
			<div class="card-arrow" aria-hidden="true">
				<i class="fa-solid fa-arrow-up-right-from-square"></i>
			</div>

			<div class="card-head">
				<!-- inline SVG image (simple, crisp, no external requests) -->
				<img class="card-img" src="/static-assets/apps/paste/images/paste.png" alt="Paste Logo">

				<div>
					<!-- <div class="card-eyebrow">Text</div> -->
					<h3 class="card-title">Share Text</h3>
				</div>
			</div>

			<p class="card-desc">Quickly paste and share snippets — plain text, code, or logs..
			</p>
		</div>

		<div class="card" role="button" tabindex="0" data-path="/apps/sharefile" aria-label="Share Files">
			<div class="card-arrow" aria-hidden="true">
				<i class="fa-solid fa-arrow-up-right-from-square"></i>

			</div>

			<div class="card-head">
				<img class="card-img" src="/static-assets/apps/sharefile/images/ShareFile.webp" alt="Share File Logo">

				<div>
					<!-- <div class="card-eyebrow">File</div> -->
					<h3 class="card-title">Share Files</h3>
				</div>
			</div>

			<p class="card-desc">Upload and send files quickly — large file support, quick downloads.</p>
		</div>
	</main>

	<script>
		(function () {
			const cards = document.querySelectorAll('.card[role="button"]');
			cards.forEach(c => {
				const path = c.dataset.path;
				if (!path) return;
				function navigate() {
					const url = window.location.protocol + '//' + window.location.host + path;
					window.open(url);
				}
				c.addEventListener('click', navigate);
				c.addEventListener('keydown', e => {
					if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); navigate(); }
				});
			});

			/* Change icon based on device theme */

			const LIGHT_ICON = '/static-assets/images/HTML-Tag-Black.png'; // used on light/system-light
			const DARK_ICON = '/static-assets/images/HTML-Tag-White.png'; // used on dark/system-dark

			// set or replace a favicon link element
			function setFavicon(href) {
				let link = document.querySelector('link[rel~="icon"]');
				if (!link) {
					link = document.createElement('link');
					link.rel = 'icon';
					link.type = 'image/png';
					document.head.appendChild(link);
				}
				// add a cache-busting query so browsers pick up changes while testing (optional)
				link.href = href;
			}

			// detection + listener
			if (window.matchMedia) {
				const mq = window.matchMedia('(prefers-color-scheme: dark)');

				// update function accepts either a MediaQueryList or an event with .matches
				function update(e) {
					const isDark = typeof e.matches === 'boolean' ? e.matches : mq.matches;
					setFavicon(isDark ? DARK_ICON : LIGHT_ICON);
				}

				// initial set
				update(mq);

				// listen for changes
				if (mq.addEventListener) mq.addEventListener('change', update);
				else if (mq.addListener) mq.addListener(update);
			} else {
				// fallback if matchMedia not supported
				setFavicon(LIGHT_ICON);
			}
		})();
	</script>
</body>

</html>
